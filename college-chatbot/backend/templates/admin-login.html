<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Baderia Global Helpdesk</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <header>
        <a href="landing.html" class="logo">
            <img src="assets/gglogo.png" alt="Baderia Global Institute of engineering and management Logo" onerror="this.src='https://via.placeholder.com/45x45?text=B'">
            Baderia Global Institute of engineering and management
        </a>
        <nav class="nav-links">
            <a href="index.html" class="btn btn-outline">Back to Chat</a>
        </nav>
    </header>

    <main class="main-container admin-container">
        <div class="login-card glass-panel">
            <h2>Admin Login</h2>
            <p>Access the knowledge base management system</p>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" required placeholder="admin@baderia.edu">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
